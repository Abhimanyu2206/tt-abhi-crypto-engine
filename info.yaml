# Tiny Tapeout project information
project:
  title:        "Mini Crypto Engine"      # Project title
  author:       "Abhimanyu"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "8-bit multi-round crypto engine using XOR, rotation and substitution"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     10000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_abhi_crypto"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "mini_crypto_engine.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "start signal (1 = start encryption)"
  ui[1]: "data_in bit 1"
  ui[2]: "data_in bit 2"
  ui[3]: "data_in bit 3"
  ui[4]: "data_in bit 4"
  ui[5]: "data_in bit 5"
  ui[6]: "data_in bit 6"
  ui[7]: "data_in bit 7"

  # Outputs
  uo[0]: "encrypted output bit 0"
  uo[1]: "encrypted output bit 1"
  uo[2]: "encrypted output bit 2"
  uo[3]: "encrypted output bit 3"
  uo[4]: "encrypted output bit 4"
  uo[5]: "encrypted output bit 5"
  uo[6]: "encrypted output bit 6"
  uo[7]: "encrypted output bit 7"

  # Bidirectional pins
  uio[0]: "unused"
  uio[1]: "unused"
  uio[2]: "unused"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

yaml_version: 6
